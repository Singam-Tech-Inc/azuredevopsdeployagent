<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a202c;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 32px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    header h1 { font-size: 1.6rem; }
    .badge {
      padding: 3px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #2d3748;
    }
    .badge-green { background: #276749; color: #c6f6d5; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 36px;
    }
    .stat-card {
      background: #2d3748;
      border-radius: 10px;
      padding: 20px 24px;
    }
    .stat-card .label { font-size: 0.78rem; color: #a0aec0; margin-bottom: 6px; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; color: #63b3ed; }
    .table-wrap { background: #2d3748; border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #1a202c; padding: 12px 16px; text-align: left; font-size: 0.78rem; color: #a0aec0; text-transform: uppercase; letter-spacing: .05em; }
    td { padding: 13px 16px; border-top: 1px solid #1a202c; font-size: 0.9rem; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; background: #48bb78; }
  </style>
</head>
<body>
  <header>
    <h1>&#128202; Dashboard</h1>
    <span class="badge badge-green">Live</span>
    <span class="badge" style="margin-left:auto;font-size:.7rem;" id="route-info">dashboard.app.localhost &#8594; Traefik &#8594; :5000</span>
  </header>

  <div class="grid">
    <div class="stat-card">
      <div class="label">Services Running</div>
      <div class="value" id="stat-services">—</div>
    </div>
    <div class="stat-card">
      <div class="label">API Latency</div>
      <div class="value" id="stat-latency">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Uptime</div>
      <div class="value" id="stat-uptime">—</div>
    </div>
    <div class="stat-card">
      <div class="label">Environment</div>
      <div class="value" style="font-size:1.1rem;padding-top:8px;">Docker</div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Service</th><th>Status</th>
        </tr>
      </thead>
      <tbody id="items-body">
        <tr><td colspan="3" style="color:#a0aec0;text-align:center">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const start = Date.now();

    function tick() {
      const s = Math.floor((Date.now() - start) / 1000);
      const h = String(Math.floor(s / 3600)).padStart(2, '0');
      const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
      const sec = String(s % 60).padStart(2, '0');
      document.getElementById('stat-uptime').textContent = `${h}:${m}:${sec}`;
    }
    setInterval(tick, 1000);
    tick();

    fetch('/config.json')
      .then(r => r.json())
      .then(cfg => {
        const t0 = Date.now();
        return fetch(cfg.apiUrl + '/api/items').then(r => ({ r, latency: Date.now() - t0 }));
      })
      .then(({ r, latency }) => {
        document.getElementById('stat-latency').textContent = `${latency} ms`;
        return r.json();
      })
      .then(data => {
        document.getElementById('stat-services').textContent = data.items.length;
        const tbody = document.getElementById('items-body');
        tbody.innerHTML = data.items.map((item, i) => `
          <tr>
            <td style="color:#718096">${i + 1}</td>
            <td>${item.name}</td>
            <td><span class="dot"></span>${item.status}</td>
          </tr>
        `).join('');
      })
      .catch(err => {
        document.getElementById('stat-services').textContent = 'err';
        document.getElementById('stat-latency').textContent = 'err';
        console.error(err);
      });
  </script>
</body>
</html>
